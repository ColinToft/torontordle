name: Sync diagnosis data

# Nightly job that re-bakes the diagnosis bank (clue text + in-cell images) from
# the Google Sheet into src/cases.json + public/case-images/, commits any
# changes, and redeploys the site.
#
# Deploy approach (a): this workflow runs the build + Pages deploy itself after
# committing. We can't rely on deploy.yml firing on our push, because GitHub
# deliberately does NOT trigger workflows from commits pushed by the default
# GITHUB_TOKEN (loop prevention). So we reuse the deploy steps here, and only
# deploy when something actually changed.

on:
  schedule:
    # 07:00 UTC nightly (~02:00/03:00 ET depending on DST).
    - cron: "0 7 * * *"
  workflow_dispatch:

# Least privilege: we need to write the commit (contents) and publish to Pages.
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync data from the sheet
        run: npm run sync-data
        env:
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}

      - name: Commit changed data (if any)
        id: commit
        run: |
          git add public/case-images src/cases.json src/history.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "torontordle-bot"
            git config user.email "torontordle-bot@users.noreply.github.com"
            git commit -m "chore: sync diagnosis data from sheet [skip ci]

          Co-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Only build + deploy when something actually changed.
      - name: Setup Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v6

      - name: Build
        if: steps.commit.outputs.changed == 'true'
        run: npm run build

      - name: Upload artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.commit.outputs.changed == 'true'
        uses: actions/deploy-pages@v5
