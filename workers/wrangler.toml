name = "torontordle-stats"
main = "src/index.ts"
compatibility_date = "2026-06-09"
workers_dev = true

# Serve at a stable custom domain (the torontordle.com zone is in this account).
# wrangler creates the proxied DNS record + cert automatically on deploy.
routes = [
  { pattern = "api.torontordle.com", custom_domain = true }
]

# D1 binding. database_id is filled in after `wrangler d1 create torontordle-stats`.
[[d1_databases]]
binding = "DB"
database_name = "torontordle-stats"
database_id = "PLACEHOLDER_FILLED_AFTER_D1_CREATE"
